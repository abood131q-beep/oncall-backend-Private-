# OnCall — Prometheus configuration (P7-04)
# All targets are on the internal Docker network; nothing is scraped publicly.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  # Backend liveness + latency via /health (no code changes: the app exposes
  # no native Prometheus endpoint yet — see PLATFORM_BACKLOG M-5)
  - job_name: backend-health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://oncall-backend:3000/health']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # TLS certificate expiry (via nginx HTTPS)
  - job_name: tls-cert
    metrics_path: /probe
    params:
      module: [https_insecure]     # self-signed OK; expiry metric still exported
    static_configs:
      - targets: ['https://nginx:8443/nginx-health', 'https://nginx:8443/health']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

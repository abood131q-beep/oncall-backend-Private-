<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>On Call</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

button{
padding:12px;
margin:5px;
width:200px;
}

.card{
background:#222;
padding:10px;
margin:10px;
border-radius:10px;
}
</style>

</head>
<body>

<h1>🚕 On Call</h1>

<button onclick="loadScooters()">السكوترات</button>
<button onclick="loadCars()">السيارات</button>
<button onclick="loadDrivers()">السائقين</button>
<button onclick="requestTaxi()">طلب تكسي</button>

<div id="result"></div>

<script>

async function loadScooters(){

const res = await fetch('/scooters');
const data = await res.json();

document.getElementById("result").innerHTML =
"<h2>السكوترات</h2>" +
data.map(s=>`
<div class="card">
${s.name}<br>
بطارية ${s.battery}%<br>
${s.status}
</div>
`).join('');
}

async function loadCars(){

const res = await fetch('/cars');
const data = await res.json();

document.getElementById("result").innerHTML =
"<h2>السيارات</h2>" +
data.map(c=>`
<div class="card">
${c.name}<br>
وقود ${c.fuel}%<br>
${c.status}
</div>
`).join('');
}

async function loadDrivers(){

const res = await fetch('/drivers');
const data = await res.json();

document.getElementById("result").innerHTML =
"<h2>السائقين</h2>" +
data.map(d=>`
<div class="card">
${d.name}<br>
${d.car}<br>
${d.status}
</div>
`).join('');
}

async function requestTaxi(){

const res = await fetch('/taxi/request',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
pickup:'صباح الأحمد',
destination:'الكوت'
})
});

const data = await res.json();

document.getElementById("result").innerHTML =
`
<div class="card">
${data.message}
</div>
`;
}

</script>

</body>
</html>

# OnCall — production nginx.conf (P7-03)
# Base: nginx-unprivileged (uid 101) — pid/temp paths MUST stay under /tmp
# (read-only rootfs; /tmp is tmpfs). Server blocks live in conf.d/*.conf.

worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;   # → /dev/stderr (image symlink)
pid       /tmp/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/json;

    # ── Unprivileged-image temp paths (required for read-only rootfs) ────────
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_dir;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # ── Separate logs: access → stdout, error → stderr (json-file rotation) ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time '
                    'up=$upstream_response_time "$http_user_agent"';
    access_log /var/log/nginx/access.log main;   # → /dev/stdout (image symlink)

    # ── Core performance ─────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;

    # Keep-alive tuning
    keepalive_timeout 65s;
    keepalive_requests 1000;

    # ── Slowloris / abuse protection ─────────────────────────────────────────
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          30s;
    reset_timedout_connection on;

    # Large-request abuse: backend caps JSON at 1 MB — mirror at the edge
    client_max_body_size    1m;
    client_body_buffer_size 64k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ── Proxy buffers / timeouts (API-tuned) ─────────────────────────────────
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    75s;      # > Socket.IO pingTimeout+pingInterval (40s)
    proxy_buffers         8 16k;
    proxy_buffer_size     16k;
    proxy_busy_buffers_size 32k;

    # ── Gzip (JSON API) ──────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/json text/plain text/css application/javascript;

    # ── Rate limiting zones (basic edge protection; app has its own limits) ──
    # Sizing note: Kuwaiti carrier NAT can put many users behind one IP —
    # limits are per-IP and deliberately generous; the backend's per-phone
    # limiter (rateLimiter.js) is the precise second layer.
    limit_req_zone  $binary_remote_addr zone=auth:10m  rate=30r/m;  # login/refresh
    limit_req_zone  $binary_remote_addr zone=otp:10m   rate=10r/m;  # OTP sends
    limit_req_zone  $binary_remote_addr zone=api:10m   rate=30r/s;  # general flood guard
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_req_status  429;
    limit_conn_status 429;

    # WebSocket upgrade mapping (Socket.IO)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}

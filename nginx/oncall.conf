# OnCall — edge gateway server blocks (P7-03)
# TLS 1.3 (1.2 fallback) · HTTP/2 · HSTS · security headers · rate limiting
# Certs: /etc/nginx/certs/{fullchain.pem,privkey.pem} — Docker volume mount.
#   deploy.sh generates a self-signed pair for dev; swap in Let's Encrypt or
#   wildcard certs at the same paths (see README_DOCKER.md).

# ── Upstream: defined in 00-upstream.conf (managed by deploy-release.sh) ─────

# ── HTTP :8080 (host :80) — redirect + ACME + internal health only ───────────
server {
    listen 8080 default_server;
    server_name _;

    # Container healthcheck (never redirected)
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # Let's Encrypt HTTP-01 challenge webroot (certbot writes, nginx serves)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Metrics :8081 — INTERNAL ONLY (never published in compose) ───────────────
# Scraped by nginx-prometheus-exporter over the internal Docker network.
server {
    listen 8081;
    server_name _;
    access_log off;
    location = /stub_status {
        stub_status;
    }
    location / { return 404; }
}

# ── HTTPS :8443 (host :443) — production gateway ─────────────────────────────
server {
    listen 8443 ssl default_server;
    http2 on;
    server_name _;

    # ── TLS (Mozilla intermediate) ───────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;   # TLS1.3 & modern clients pick best
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — effective with CA-issued certs (no-op for self-signed;
    # nginx logs a warning and continues)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 127.0.0.11 valid=300s ipv6=off;   # Docker embedded DNS
    resolver_timeout 5s;

    # ── Security headers (API-appropriate) ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # ── Method allow-list ────────────────────────────────────────────────────
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) { return 405; }

    # ── Connection cap per IP (flood guard; WS conns are long-lived) ─────────
    limit_conn perip 50;

    # ── Shared proxy settings ────────────────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ── Auth endpoints — strict rate limits ──────────────────────────────────
    location = /login          { limit_req zone=auth burst=10 nodelay; proxy_set_header Connection ""; proxy_pass http://oncall_backend; }
    location = /driver/login   { limit_req zone=auth burst=10 nodelay; proxy_set_header Connection ""; proxy_pass http://oncall_backend; }
    location = /auth/refresh   { limit_req zone=auth burst=10 nodelay; proxy_set_header Connection ""; proxy_pass http://oncall_backend; }
    location = /auth/otp/send  { limit_req zone=otp  burst=5  nodelay; proxy_set_header Connection ""; proxy_pass http://oncall_backend; }

    # ── Socket.IO — WebSocket optimized, NO rate limiting ────────────────────
    # (active rides + driver location streams must never be throttled)
    location /socket.io/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;         # realtime frames, no store-and-forward
        proxy_read_timeout 75s;      # > pingTimeout(30s)+pingInterval(10s)
        proxy_send_timeout 75s;
        proxy_pass http://oncall_backend;
    }

    # ── REST API — general flood guard, generous for location updates ────────
    location / {
        limit_req zone=api burst=60 nodelay;
        proxy_set_header Connection "";   # enable upstream keepalive
        proxy_pass http://oncall_backend;
    }

    # Static asset caching: N/A — this origin serves a JSON API only.
    # (If static assets are ever added, give them a location with
    #  `expires 7d; add_header Cache-Control "public, immutable";`.)
}

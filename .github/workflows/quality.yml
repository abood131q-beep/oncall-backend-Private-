# P7-06 — Security & Quality pipeline (runs alongside ci.yml)
name: quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  license-check:
    name: License Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: npm }
      - run: npm ci
      - name: Fail on high-risk licenses (production deps)
        run: |
          npx --yes license-checker --production --summary
          npx --yes license-checker --production \
            --failOn 'GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0;SSPL-1.0;CC-BY-NC-4.0'

  sbom:
    name: SBOM (CycloneDX + SPDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: npm }
      - run: npm ci
      - run: npx --yes @cyclonedx/cyclonedx-npm --omit dev --output-format JSON --output-file sbom.cdx.json
      - name: SPDX SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.cdx.json
            sbom.spdx.json
          retention-days: 90

  docker-build-check:
    name: Docker Build Verification (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: oncall-backend:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Image boots and reports health structure
        run: |
          docker run -d --name ci-smoke -e JWT_SECRET=ci-test-secret-at-least-32-chars \
            -p 3000:3000 oncall-backend:ci-check
          for i in $(seq 1 24); do
            s=$(docker inspect ci-smoke --format '{{.State.Health.Status}}')
            [ "$s" = healthy ] && break; [ "$s" = unhealthy ] && break; sleep 5
          done
          docker inspect ci-smoke --format '{{.State.Health.Status}}' | grep -q healthy \
            || { docker logs ci-smoke; exit 1; }
          curl -fsS localhost:3000/health
          docker rm -f ci-smoke

  coverage-sonar:
    name: Coverage + SonarQube Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: npm }
      - run: npm ci
      - name: Unit tests with coverage (lcov)
        run: |
          mkdir -p coverage
          node --test --experimental-test-coverage \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=lcov --test-reporter-destination=coverage/lcov.info \
            tests/unit/repositories.test.js
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/lcov.info
          retention-days: 30
      - name: Check Sonar token
        id: sonar-check
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT";
          else echo "enabled=false" >> "$GITHUB_OUTPUT"; echo "::warning::SONAR_TOKEN not configured — Quality Gate skipped (add the secret to enforce it)"; fi
      - name: SonarQube scan
        if: steps.sonar-check.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: >
            -Dsonar.projectKey=oncall-backend
            -Dsonar.sources=src,server.js,database.js
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
      - name: Quality Gate (blocking)
        if: steps.sonar-check.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

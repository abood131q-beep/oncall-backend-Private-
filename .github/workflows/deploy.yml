# P7-06 — Production deployment (progressive + auto-rollback)
# Protected by the `production` GitHub Environment: configure required reviewers
# there so every production deploy needs explicit human approval.
name: deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to deploy (e.g. v1.2.3)"
        required: true
      strategy:
        description: "Deployment strategy"
        type: choice
        default: rolling
        options: [rolling, blue-green, canary]
      canary_weight:
        description: "Canary traffic % (canary strategy only)"
        default: "10"

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production          # ← approval gate lives here
    steps:
      - name: Verify release signature before touching production
        run: |
          curl -sSLo cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x cosign
          ./cosign verify ghcr.io/${{ github.repository_owner }}/oncall-backend:${{ inputs.version }} \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Deploy via SSH (progressive, auto-rollback on failure)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            export ONCALL_IMAGE=ghcr.io/${{ github.repository_owner }}/oncall-backend
            export COSIGN_CERT_IDENTITY="^https://github.com/${{ github.repository }}"
            ./deploy-release.sh "${{ inputs.version }}" "${{ inputs.strategy }}" "${{ inputs.canary_weight }}"

name: OnCall CI

on:
  # Architecture compliance is mandatory for every code change.
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Job 0: Security Audit (P6-06A)
  # npm audit --audit-level=high يفشل البناء إذا وُجدت ثغرة high/critical
  # ─────────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high

      - name: MCP npm audit
        working-directory: tools/oncall-mcp
        run: |
          npm ci
          npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────────
  # Job 1: Lint + Format
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dev dependencies
        run: npm ci --include=dev

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: Build (تحقق من صحة الكود)
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build & Syntax Check
    runs-on: ubuntu-latest
    # Decoupled: syntax + MCP build are static checks that do not depend on the test chain,
    # so they run immediately in parallel instead of waiting behind test→mcp-test→architecture.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check — server.js
        run: node --check server.js

      - name: Syntax check — src/
        run: |
          find src -name '*.js' | while read f; do
            node --check "$f" || exit 1
          done
          echo "✅ All src/ files pass syntax check"

      - name: Build MCP server
        working-directory: tools/oncall-mcp
        run: |
          npm ci
          npm run build
          echo "✅ MCP server built"

  # ─────────────────────────────────────────────────────────────────────
  # Job 3: Backend Tests (run_tests.sh)
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    # Hard ceiling: even a future open-handle leak now fails in ≤20 min instead of GitHub's 6h cap.
    timeout-minutes: 20

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-at-least-32-chars-long' }}
      ADMIN_PHONES: ${{ secrets.ADMIN_PHONES || '' }}
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for CI
        run: |
          echo "JWT_SECRET=${JWT_SECRET}" > .env
          echo "ADMIN_PHONES=${ADMIN_PHONES}" >> .env
          echo "PORT=${PORT}" >> .env

      - name: Install sqlite3 CLI
        run: sudo apt-get install -y sqlite3

      - name: Build MCP (needed for MCP tests)
        working-directory: tools/oncall-mcp
        run: npm ci && npm run build

      - name: Run unit tests (repositories)
        run: npm run test:unit

      - name: Run full test suite
        run: bash run_tests.sh 2>&1 | tee test_output.txt

      - name: Check test results
        run: |
          FAIL=$(grep -c "❌ FAIL" test_output.txt || true)
          WARN=$(grep -c "⚠️  WARN" test_output.txt || true)
          PASS=$(grep -c "✅ PASS" test_output.txt || true)
          echo ""
          echo "═══════════════════════════════════"
          echo "  PASS: $PASS  |  FAIL: $FAIL  |  WARN: $WARN"
          echo "═══════════════════════════════════"
          if [ "$FAIL" -gt "0" ]; then
            echo "❌ Tests FAILED — $FAIL failure(s)"
            grep "❌ FAIL" test_output.txt
            exit 1
          fi
          if [ "$WARN" -gt "0" ]; then
            echo "⚠️  Warnings present — $WARN warning(s)"
            grep "⚠️" test_output.txt
            exit 1
          fi
          echo "✅ All tests passed!"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test_output.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Job 4: MCP Tests (standalone)
  # ─────────────────────────────────────────────────────────────────────
  mcp-test:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-at-least-32-chars-long' }}
      ADMIN_PHONES: ${{ secrets.ADMIN_PHONES || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Install sqlite3 CLI
        run: sudo apt-get install -y sqlite3

      - name: Create .env for CI
        run: |
          echo "JWT_SECRET=${JWT_SECRET}" > .env
          echo "ADMIN_PHONES=${ADMIN_PHONES}" >> .env
          echo "PORT=3000" >> .env

      - name: Build MCP server
        working-directory: tools/oncall-mcp
        run: npm ci && npm run build

      - name: Start backend in background
        run: |
          node server.js &
          echo $! > /tmp/server.pid
          sleep 3
          curl -sf http://localhost:3000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print('Server OK:', d['status'])"

      - name: Run MCP tests
        working-directory: tools/oncall-mcp
        run: |
          PASS=$(node test-mcp.mjs 2>/dev/null | grep -c "✓" || true)
          FAIL=$(node test-mcp.mjs 2>/dev/null | grep -c "✗" || true)
          echo "MCP Tests — ✓ $PASS / ✗ $FAIL"
          if [ "$FAIL" -gt "0" ]; then
            echo "⚠️  Some MCP tests failed (may be due to admin auth)"
          fi

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 5: Architecture Governance Gate (Phase 3.6)
  # Executes after all tests and before the build. The verifier exits non-zero
  # for every CRITICAL ADR violation, which blocks the workflow and merge.
  # ─────────────────────────────────────────────────────────────────────
  architecture:
    name: Architecture Verification
    runs-on: ubuntu-latest
    # Decoupled from the test chain: R1–R9 is static source analysis with no runtime dependency,
    # so it runs immediately and still gates the merge via the summary job. Previously it waited
    # behind test→mcp-test, so a hung test blocked the architecture gate from ever reporting.
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Architecture Verification
        shell: bash
        run: |
          set -o pipefail
          set +e
          node architecture/compliance/verify-architecture.mjs | tee architecture-verification.log
          VERIFY_STATUS=${PIPESTATUS[0]}
          set -e

          VIOLATION_COUNT=$(grep -cE '^  \[(CRITICAL|MAJOR)\]' architecture-verification.log || true)
          VIOLATIONS="${VIOLATION_COUNT} violation(s)"

          if [ "$VERIFY_STATUS" -ne 0 ]; then
            echo "::error title=Architecture Verification FAIL::${VIOLATIONS}; CRITICAL architecture violation(s) block this workflow."
            echo "❌ Architecture Verification: FAIL (${VIOLATIONS})"
            exit "$VERIFY_STATUS"
          fi

          echo "✅ Architecture Verification: PASS (${VIOLATIONS})"

      - name: Upload architecture verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-verification-${{ github.run_number }}
          path: architecture-verification.log
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # A/B Compatibility Gate (Phase 12: C5) — fail CI on ANY public-contract drift
  # ─────────────────────────────────────────────────────────────────────
  ab-compat:
    name: A/B Compatibility
    runs-on: ubuntu-latest
    needs: architecture
    timeout-minutes: 20
    env:
      JWT_SECRET: ci-ab-secret-0123456789abcdef0123456789abcdef
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Enterprise shadow parity gate (sqlite-free, runs anywhere)
        run: npm run verify:shadow
      - name: Run ALL A/B compatibility harnesses (byte-identical or fail)
        run: npm run test:ab
      - name: Identity Gate B2 evidence (parity + socket + HTTP/refresh/revocation)
        run: npm run identity:gate-b2
      - name: Upload Identity Gate B2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: identity-gate-b2-evidence-${{ github.run_number }}
          path: architecture/phase-20.b/evidence/
      - name: Unit coverage report
        run: npm run test:coverage || true

  # ─────────────────────────────────────────────────────────────────────
  # PostgreSQL Cross-Engine Gate (P0-1) — proves the PG live path is
  # byte-identical to SQLite. Provisions a throwaway Postgres (Docker),
  # applies PG migrations, runs unit tests + the SQLite≡PostgreSQL A/B.
  # ─────────────────────────────────────────────────────────────────────
  postgres:
    name: PostgreSQL Cross-Engine A/B
    runs-on: ubuntu-latest
    needs: architecture
    timeout-minutes: 20
    env:
      JWT_SECRET: ci-pg-secret-0123456789abcdef0123456789abcdef
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: PostgreSQL live-path verification (migrations + SQLite≡PostgreSQL A/B)
        run: bash scripts/verify-postgres.sh

  # ─────────────────────────────────────────────────────────────────────
  # Summary — يظهر في GitHub PR checks
  # ─────────────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [security, lint, test, mcp-test, architecture, build, ab-compat, postgres]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Check all jobs
        run: |
          echo "┌─────────────────────────────────┐"
          echo "│       OnCall CI Summary          │"
          echo "├─────────────────────────────────┤"
          echo "│ Security:  ${{ needs.security.result }}"
          echo "│ Lint:      ${{ needs.lint.result }}"
          echo "│ Tests:     ${{ needs.test.result }}"
          echo "│ MCP Tests: ${{ needs.mcp-test.result }}"
          echo "│ Architecture Verification: ${{ needs.architecture.result }}"
          echo "│ Build:     ${{ needs.build.result }}"
          echo "└─────────────────────────────────┘"
          if [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.mcp-test.result }}" != "success" ] || \
             [ "${{ needs.architecture.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.ab-compat.result }}" != "success" ] || \
             [ "${{ needs.postgres.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ CI Failed"
            exit 1
          fi
          echo "✅ CI Passed"

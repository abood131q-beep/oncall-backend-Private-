# P7-06 — Automatic semantic versioning + release notes (conventional commits)
# On every merge to main, release-please maintains a release PR; merging that PR
# creates the semver git tag + GitHub Release with generated notes, which then
# triggers docker-release.yml (build → scan → sign → publish).
name: release-please

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Auth: prefer a repo-scoped PAT (RELEASE_PLEASE_TOKEN) so release-please can open the
      # release PR even when the org/repo setting "Allow GitHub Actions to create and approve pull
      # requests" is OFF (a PAT acts as the user, not as GitHub Actions). Falls back to the default
      # GITHUB_TOKEN, which additionally requires that setting to be enabled.
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

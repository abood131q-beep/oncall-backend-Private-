# ═════════════════════════════════════════════════════════════════════════════
# OnCall Platform — Production Compose (P7-02)
#
#   docker compose -f docker-compose.prod.yml up -d
#
# Topology
#   edge     (bridge)          : nginx only — the single public entry point
#   internal (internal: true)  : backend ↔ postgres ↔ redis — no host access
#
# ⚠️ Current-state note (P7-02): the backend runs on SQLite + in-memory stores.
#    postgres/redis are provisioned AHEAD of the planned migration (ADR-001
#    Option E roadmap; rateLimiter Redis upgrade path) and are NOT yet consumed
#    by application code. Nginx proxy configuration arrives in P7-03.
#
# Secrets: file-based Docker secrets under ./secrets/ (git-ignored).
#   App env comes from .env.production. The *_FILE / /run/secrets pattern maps
#   1:1 onto Kubernetes Secrets (mounted files) for future migration.
# ═════════════════════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-hardening: &default-hardening
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  oncall-backend:
    <<: *default-hardening
    # ONCALL_IMAGE/ONCALL_VERSION are set by deploy-release.sh (P7-06 CD);
    # defaults preserve the local-build behavior.
    image: ${ONCALL_IMAGE:-oncall-backend}:${ONCALL_VERSION:-1.0.0}
    build:
      context: .
      args:
        VERSION: "${ONCALL_VERSION:-1.0.0}"
    container_name: oncall-backend
    env_file: .env.production
    # No public ports — reachable only through nginx (P7-03) on the internal net
    networks: [internal]
    read_only: true
    cap_drop: [ALL]
    init: true
    user: node
    volumes:
      - backend-data:/data            # SQLite DB + WAL/SHM (via /app/oncall.db symlink)
      - backend-logs:/app/logs
      - backend-backups:/app/backups
    tmpfs:
      - /tmp:size=16m,mode=1777
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128
    ulimits:
      nofile: { soft: 4096, hard: 8192 }
    stop_grace_period: 15s
    logging: *default-logging
    # Healthcheck inherited from image (node fetch → /health)
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── PostgreSQL (forward-provisioned — see current-state note) ──────────────
  postgresql:
    <<: *default-hardening
    image: postgres:17-alpine
    container_name: oncall-postgres
    user: postgres
    networks: [internal]
    environment:
      POSTGRES_USER: oncall
      POSTGRES_DB: oncall
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
      - /run/postgresql              # unix socket dir (needed with read_only)
    read_only: true
    cap_drop: [ALL]
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    ulimits:
      nofile: { soft: 4096, hard: 8192 }
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncall -d oncall"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis (forward-provisioned — see current-state note) ───────────────────
  redis:
    <<: *default-hardening
    image: redis:7-alpine
    container_name: oncall-redis
    user: redis
    networks: [internal]
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$(cat /run/secrets/redis_password)\""]
    secrets: [redis_password]
    volumes:
      - redis-data:/data
    tmpfs:
      - /tmp
    read_only: true
    cap_drop: [ALL]
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64
    ulimits:
      nofile: { soft: 4096, hard: 8192 }
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Nginx — minimal reverse proxy: client → nginx → backend (P7-02) ────────
  # SSL / HTTP2 / compression / headers / rate-limiting / caching → P7-03
  nginx:
    <<: *default-hardening
    image: nginxinc/nginx-unprivileged:stable-alpine   # runs as uid 101, listens 8080
    container_name: oncall-nginx
    networks: [edge, internal]
    ports:
      - "80:8080"                    # redirect + ACME challenge only
      - "443:8443"                   # production TLS endpoint
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/00-upstream.conf:ro
      - ./nginx/oncall.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro  # fullchain.pem + privkey.pem (LE / self-signed / wildcard)
      - acme-webroot:/var/www/certbot:ro   # future certbot container writes here
    read_only: true
    cap_drop: [ALL]
    tmpfs:
      - /tmp                         # unprivileged image caches/pid under /tmp
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 64
    ulimits:
      nofile: { soft: 4096, hard: 8192 }
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      oncall-backend:
        condition: service_healthy

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true                   # no host/egress access; container-to-container only

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  backend-data:
  backend-logs:
  backend-backups:
  postgres-data:
  redis-data:
  acme-webroot:

# ── Secrets (file-based; K8s-Secret-compatible /run/secrets layout) ──────────
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
